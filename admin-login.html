<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход для администратора - VAT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .login-title {
            text-align: center;
            color: #001a8c;
            margin-bottom: 20px;
        }
        
        .login-subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 8px;
            border-left: 4px solid #ffaa00;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            border-color: #001a8c;
            outline: none;
            box-shadow: 0 0 10px rgba(0,26,140,0.2);
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #001a8c, #320063);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,26,140,0.4);
        }
        
        .error-message {
            color: #d43f6b;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
        
        .back-link:hover {
            color: #001a8c;
        }
        
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #001a8c;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .info-box p {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .debug-box {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            display: none;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .success {
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🏠 Главная
            </a>
            <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🎦 Тайтлы
            </a>
            <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🎭 Состав
            </a>
        </div>
    </div>

    <div class="login-container">
        <h1 class="login-title">🔐 Вход в админ-панель</h1>
        
        <div class="login-subtitle">
            ⚠️ Вход только для администраторов
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="voiceactingteam8@gmail.com" required>
            </div>
            
            <div class="form-group">
                <label>🔑 Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>
            
            <button type="submit" class="login-button">Войти</button>
            
            <div id="errorMessage" class="error-message"></div>
        </form>
        
        <div id="debugBox" class="debug-box">
            <strong>Отладочная информация:</strong><br>
            <span id="debugText"></span>
        </div>
        
        <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>

    <script type="module">
        // ИМПОРТИРУЕМ ПРАВИЛЬНО - используем default import
        import firebase from './firebase-config.js';
        
        console.log('Firebase импортирован:', firebase);
        
        // Проверяем, что firebase загрузился
        if (!firebase) {
            document.getElementById('errorMessage').textContent = '❌ Ошибка загрузки Firebase';
            document.getElementById('debugBox').style.display = 'block';
            document.getElementById('debugText').textContent = 'firebase = undefined';
        }
        
        // Кнопка для заполнения тестовых данных
        document.getElementById('fillTestData').addEventListener('click', () => {
            document.getElementById('email').value = 'voiceactingteam8@gmail.com';
            document.getElementById('password').value = 'A55411455a_';
            document.getElementById('debugText').textContent = 'Поля заполнены';
        });
        
        // Обработка формы входа
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const debugBox = document.getElementById('debugBox');
            const debugText = document.getElementById('debugText');
            
            errorDiv.textContent = '⏳ Вход...';
            errorDiv.style.color = '#666';
            
            // Показываем отладочную информацию
            debugBox.style.display = 'block';
            debugText.innerHTML = `Пытаемся войти с:<br>Email: ${email}<br>Пароль: ${password.replace(/./g, '*')}<br><br>`;
            
            try {
                console.log('Запускаем loginAdmin...');
                
                // Проверяем, есть ли функция loginAdmin
                if (!firebase || typeof firebase.loginAdmin !== 'function') {
                    throw new Error('Функция loginAdmin не найдена в firebase');
                }
                
                debugText.innerHTML += `Вызываем firebase.loginAdmin(${email})...<br>`;
                
                const result = await firebase.loginAdmin(email, password);
                console.log('Результат:', result);
                
                debugText.innerHTML += `Результат: ${JSON.stringify(result, null, 2)}<br>`;
                
                if (result && result.success) {
                    errorDiv.innerHTML = '✅ <span class="success">Успешный вход! Перенаправление...</span>';
                    errorDiv.style.color = '#4CAF50';
                    
                    debugText.innerHTML += `✅ Успех! Перенаправляем...<br>`;
                    
                    setTimeout(() => {
                        window.location.href = 'admin-panel.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = '❌ ' + (result?.error || 'Неизвестная ошибка');
                    errorDiv.style.color = '#d43f6b';
                    debugText.innerHTML += `❌ Ошибка: ${result?.error}<br>`;
                }
            } catch (error) {
                console.error('Критическая ошибка:', error);
                errorDiv.textContent = '❌ Ошибка: ' + error.message;
                errorDiv.style.color = '#d43f6b';
                debugText.innerHTML += `❌ Исключение: ${error.message}<br>`;
                debugText.innerHTML += `Стек: ${error.stack || 'нет'}<br>`;
            }
        });
        
        // Проверяем, загрузился ли firebase
        console.log('Firebase доступен:', firebase);
        
        // Выводим все методы firebase для отладки
        if (firebase) {
            console.log('Методы Firebase:', Object.keys(firebase));
        }
    </script>
    
    <!-- Запасной вариант без модулей (если модули не работают) -->
    <script nomodule>
        alert('Ваш браузер не поддерживает модули ES6. Пожалуйста, обновите браузер.');
    </script>
</body>
</html>
