<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - VAT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .login-title {
            text-align: center;
            color: #001a8c;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #001a8c, #320063);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .error-message {
            color: #d43f6b;
            text-align: center;
            margin-top: 15px;
        }
        .info-box {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🏠 Главная</a>
            <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🎦 Тайтлы</a>
            <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🎭 Состав</a>
        </div>
    </div>

    <div class="login-container">
        <h1 class="login-title">🔐 Вход в админ-панель</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="email" value="voiceactingteam8@gmail.com" required>
            </div>
            <div class="form-group">
                <label>🔑 Пароль</label>
                <input type="password" id="password" value="A55411455a_" required>
            </div>
            <button type="submit" class="login-button">Войти</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
        
        <div class="info-box">
            <p><strong>Данные для входа:</strong> admin@vat.ru / 123456</p>
        </div>
    </div>

    <script type="module">
        import firebase from './firebase-config.js';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.textContent = '⏳ Вход...';
            
            const result = await firebase.loginAdmin(email, password);
            
            if (result.success) {
                errorDiv.textContent = '✅ Успех! Перенаправление...';
                setTimeout(() => {
                    window.location.href = 'admin-panel.html';
                }, 1000);
            } else {
                errorDiv.textContent = '❌ ' + result.error;
            }
        });
    </script>
</body>
</html>
