<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль - VAT</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="firebase-config.js"></script>
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #001a8c, #320063);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }
        .profile-info {
            flex: 1;
        }
        .profile-name {
            font-size: 36px;
            color: #001a8c;
            margin: 0;
        }
        .profile-role {
            display: inline-block;
            background: #ffaa00;
            color: #001a8c;
            padding: 5px 15px;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 10px;
        }
        .ach-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .ach-item {
            width: 70px;
            height: 70px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: help;
            transition: transform 0.3s;
        }
        .ach-item:hover {
            transform: scale(1.1);
        }
        .ach-name {
            text-align: center;
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }
        .friend-card {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .friend-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #320063;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .friend-name {
            font-weight: bold;
            color: #001a8c;
        }
        .icons {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🏠 Главная</a>
            <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🎦 Тайтлы</a>
            <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🎭 Состав</a>
        </div>
    </div>

    <div class="container" id="profileContent">
        <div class="loading">Загрузка профиля...</div>
    </div>

    <script type="module">
        import firebase from './firebase-config.js';
        window.firebase = firebase;

        const icons = {
            'newbie': '🐣',
            'critic': '✍️',
            'admin': '🛠️',
            'viewer': '👁️',
            'friend': '🤝'
        };

        async function loadProfile() {
            const user = firebase.getCurrentUser();
            const content = document.getElementById('profileContent');
            
            if (!user) {
                content.innerHTML = `
                    <div style="text-align:center; padding:50px;">
                        <h2>🔒 Не авторизован</h2>
                        <p>Войдите, чтобы увидеть профиль</p>
                        <a href="login.html" class="nav-button" style="display:inline-block;">Войти</a>
                    </div>
                `;
                return;
            }

            const userData = await firebase.getUserData(user.uid);
            const friends = await firebase.getFriends(user.uid);

            let achievementsHtml = '';
            if (userData?.achievements && userData.achievements.length > 0) {
                achievementsHtml = userData.achievements.map(ach => `
                    <div style="text-align:center;">
                        <div class="ach-item" title="${ach}">${icons[ach] || '🏅'}</div>
                        <div class="ach-name">${ach}</div>
                    </div>
                `).join('');
            } else {
                achievementsHtml = '<p>Пока нет достижений</p>';
            }

            let friendsHtml = '';
            if (friends.length > 0) {
                friendsHtml = friends.map(f => `
                    <div class="friend-card">
                        <div class="friend-avatar">${f.name?.charAt(0) || '?'}</div>
                        <div>
                            <div class="friend-name">${f.name || 'Пользователь'}</div>
                            <div class="icons">📅 с ${f.joinDate ? new Date(f.joinDate).toLocaleDateString() : 'недавно'}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                friendsHtml = '<p>Пока нет друзей</p>';
            }

            content.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${user.displayName?.charAt(0) || '👤'}</div>
                    <div class="profile-info">
                        <h1 class="profile-name">${user.displayName || 'Пользователь'}</h1>
                        <div class="profile-role">${userData?.role === 'admin' ? '👑 Администратор' : '🎭 Пользователь'}</div>
                        <p>${user.email}</p>
                        <p>📅 В команде с ${userData?.joinDate ? new Date(userData.joinDate).toLocaleDateString() : 'недавно'}</p>
                    </div>
                </div>

                ${userData?.role === 'admin' ? `
                    <div style="margin:20px 0;">
                        <a href="admin-panel.html" class="nav-button" style="background:#d43f6b;">⚙️ Админ-панель</a>
                    </div>
                ` : ''}

                <div class="content-box">
                    <h2>🏆 Достижения</h2>
                    <div class="ach-grid">${achievementsHtml}</div>
                </div>

                <div class="content-box">
                    <h2>👥 Друзья (${friends.length})</h2>
                    ${friendsHtml}
                </div>

                <div style="text-align:center; margin-top:20px;">
                    <button class="nav-button" style="background:#d43f6b;" onclick="logout()">Выйти</button>
                </div>
            `;
        }

        window.logout = async () => {
            await firebase.logout();
            window.location.href = 'index.html';
        };

        loadProfile();
    </script>
</body>
</html>
