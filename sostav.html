<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Состав команды VAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <style>
        .team-section-title {
            margin-top: 30px;
            margin-bottom: 20px;
            color: #001a8c;
            border-left: 5px solid #320063;
            padding-left: 15px;
        }
        
        .stats-box {
            display: flex;
            justify-content: space-around;
            background: linear-gradient(135deg, #001a8c10, #32006310);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #001a8c;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
        }

        @keyframes highlightPulse {
            0% { box-shadow: 0 0 20px #ffaa00; }
            50% { box-shadow: 0 0 40px #ffaa00; }
            100% { box-shadow: 0 0 20px #ffaa00; }
        }

        .team-card.highlight {
            animation: highlightPulse 1.5s infinite;
            border: 2px solid #ffaa00 !important;
            transform: scale(1.02);
            position: relative;
        }

        .search-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ffaa00;
            color: #001a8c;
            padding: 5px 12px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
        }

        .team-card-link {
            display: block;
            text-decoration: none;
            color: inherit;
        }
        
        .welcome-banner {
            background: linear-gradient(135deg, #001a8c20, #32006320);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            width: 100%;
            color: #666;
        }
        
        .error-message {
            text-align: center;
            padding: 30px;
            color: #d43f6b;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🏠 Главная
            </a>
            <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🎦 Тайтлы
            </a>
        </div>
        
        <!-- Поиск -->
        <div style="margin-top: 15px; display: flex; justify-content: center;">
            <form action="search.html" method="get" style="display: flex; width: 100%; max-width: 500px; gap: 10px;">
                <input type="text" name="q" placeholder="🔍 Поиск..." 
                       style="flex: 1; padding: 12px 20px; border: 2px solid #001a8c; border-radius: 50px; font-size: 16px; outline: none;"
                       required>
                <button type="submit" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%); color: white; border: none; padding: 0 25px; border-radius: 50px; font-weight: bold; cursor: pointer;">
                    Найти
                </button>
            </form>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="container">
        <div class="header">
            <a href="index.html">
                <img src="logo.jpg" alt="Логотип VAT" class="avatar" width="240" height="240">
            </a>
            <h1 class="title">Состав команды</h1>
            <hr>
        </div>
        
        <div class="welcome-banner">
            <h2>Все дабберы VAT</h2>
            <p class="text">Нажмите на карточку, чтобы открыть профиль</p>
        </div>

        <div class="content-box">
            <!-- Статистика -->
            <div class="stats-box" id="statsBox">
                <div class="stat-item">
                    <div class="stat-number" id="mainCount">0</div>
                    <div class="stat-label">Основной состав</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="extraCount">0</div>
                    <div class="stat-label">Доп. состав</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Всего дабберов</div>
                </div>
            </div>

            <!-- Основной состав -->
            <h2 class="team-section-title">🌟 Основной состав</h2>
            <div class="team-list" id="mainTeamList">
                <div class="loading">Загрузка...</div>
            </div>

            <!-- Дополнительный состав -->
            <h2 class="team-section-title">✨ Дополнительный состав</h2>
            <div class="team-list" id="extraTeamList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <div class="container" style="margin-top: 20px; padding: 20px; text-align: center;">
        <hr style="margin: 20px 0;">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">
            <a href="index.html" style="color: #001a8c;">Главная</a>
            <a href="titles.html" style="color: #001a8c;">Тайтлы</a>
            <a href="sostav.html" style="color: #001a8c;">Состав</a>
            <a href="privacy.html" style="color: #001a8c;">Политика</a>
        </div>
        <p style="font-size: 14px; color: #666;">© 2026 VAT</p>
    </div>

    <script>
        function loadVoices() {
            const mainList = document.getElementById('mainTeamList');
            const extraList = document.getElementById('extraTeamList');
            
            // Проверяем, загрузились ли данные
            if (!window.voicesDatabase || window.voicesDatabase.length === 0) {
                console.log('Ожидание загрузки данных...');
                // Пробуем снова через 100 мс
                setTimeout(loadVoices, 100);
                return;
            }
            
            console.log('Данные загружены, дабберов:', window.voicesDatabase.length);
            
            const mainVoices = window.voicesDatabase.filter(v => v.status === 'Основной состав');
            const extraVoices = window.voicesDatabase.filter(v => v.status === 'Доп. состав');
            
            document.getElementById('mainCount').textContent = mainVoices.length;
            document.getElementById('extraCount').textContent = extraVoices.length;
            document.getElementById('totalCount').textContent = window.voicesDatabase.length;
            
            // Основной состав
            if (mainVoices.length > 0) {
                mainList.innerHTML = mainVoices.map(voice => `
                    <a href="voice.html?id=${voice.id}" class="team-card-link">
                        <div class="team-card">
                            <img src="${voice.image}" alt="${voice.name}" class="team-card-avatar" 
                                 onerror="this.src='https://via.placeholder.com/100/001a8c/ffffff?text=${voice.name.charAt(0)}'">
                            <div class="team-card-name">${voice.name}</div>
                            <div class="team-card-roles">${voice.bio || 'Актёр дубляжа'}</div>
                            <div class="team-card-popular">🎭 Основной состав</div>
                        </div>
                    </a>
                `).join('');
            } else {
                mainList.innerHTML = '<p class="loading">Основной состав пока пуст</p>';
            }
            
            // Дополнительный состав
            if (extraVoices.length > 0) {
                extraList.innerHTML = extraVoices.map(voice => `
                    <a href="voice.html?id=${voice.id}" class="team-card-link">
                        <div class="team-card">
                            <img src="${voice.image}" alt="${voice.name}" class="team-card-avatar" 
                                 onerror="this.src='https://via.placeholder.com/100/666666/ffffff?text=${voice.name.charAt(0)}'">
                            <div class="team-card-name">${voice.name}</div>
                            <div class="team-card-roles">${voice.bio || 'Актёр дубляжа'}</div>
                            <div class="team-card-popular">🔹 Доп. состав</div>
                        </div>
                    </a>
                `).join('');
            } else {
                extraList.innerHTML = '<p class="loading">Дополнительный состав пока пуст</p>';
            }
            
            highlightFromSearch();
        }
        
        function highlightFromSearch() {
            const hash = window.location.hash.substring(1);
            if (!hash) return;
            
            const name = decodeURIComponent(hash);
            const cards = document.querySelectorAll('.team-card');
            
            cards.forEach(card => {
                const nameEl = card.querySelector('.team-card-name');
                if (nameEl && nameEl.textContent.trim() === name) {
                    card.classList.add('highlight');
                    const badge = document.createElement('div');
                    badge.className = 'search-badge';
                    badge.textContent = '🔍 Результат поиска';
                    card.style.position = 'relative';
                    card.appendChild(badge);
                    
                    setTimeout(() => {
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                }
            });
        }
        
        // Запускаем загрузку
        loadVoices();
    </script>
</body>
</html>
