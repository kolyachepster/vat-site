<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тайтлы VAT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🏠 Главная
            </a>
            <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🎭 Состав
            </a>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <a href="index.html">
                <img src="logo.jpg" alt="Логотип Вата" class="avatar" width="240" height="240">
            </a>
            <h1 class="title">Наши тайтлы</h1>
            <p class="text">Обложки кликабельны (ведут на страницу тайтла)</p>
            <hr>
        </div>
        
        <div class="content-box">
            <div class="titles-grid">
                <!-- Карточка Молчание ведьм (теперь ведет на страницу аниме, а не на главную) -->
                <a href="anime-template.html" class="title-card">
                    <img src="молч_ведьм.jpg" alt="Молчание ведьм" class="title-card-image">
                    <div class="title-card-info">
                        <div class="title-card-name">Молчаливая ведьма</div>
                        <div class="title-card-meta">
                            <span>⚡ 12 серий</span>
                            <span>⭐ 4.8</span>
                        </div>
                    </div>
                </a>
                
                <!-- Заглушки для примера. Добавите свои карточки -->
                <a href="#" class="title-card">
                    <img src="https://via.placeholder.com/200x280?text=Постер+2" alt="Название 2" class="title-card-image">
                    <div class="title-card-info">
                        <div class="title-card-name">Аниме 2</div>
                        <div class="title-card-meta">
                            <span>⚡ 24 серии</span>
                            <span>⭐ 4.5</span>
                        </div>
                    </div>
                </a>

                <a href="#" class="title-card">
                    <img src="https://via.placeholder.com/200x280?text=Постер+3" alt="Название 3" class="title-card-image">
                    <div class="title-card-info">
                        <div class="title-card-name">Аниме 3</div>
                        <div class="title-card-meta">
                            <span>⚡ Фильм</span>
                            <span>⭐ 4.9</span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
