<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тайтлы VAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        .titles-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-top: 30px;
        }
        .title-card {
            width: 200px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-decoration: none;
            color: inherit;
            border: 1px solid #eee;
        }
        .title-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .title-card-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }
        .title-card-info {
            padding: 12px;
        }
        .title-card-name {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #001a8c;
        }
        .title-card-meta {
            font-size: 14px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <div class="container">
        <div class="navigation-buttons">
    <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🏠 Главная</a>
    <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🎦 Тайтлы</a>
    <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🎭 Состав</a>
    <a href="login.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);" id="navAuthBtn">👤 Войти</a>
</div>

<script>
    setTimeout(() => {
        const user = window.firebase?.getCurrentUser();
        const btn = document.getElementById('navAuthBtn');
        if (user && btn) {
            btn.textContent = `👤 ${user.displayName || 'Профиль'}`;
            btn.href = 'profile.html';
        }
    }, 1000);
</script>
        
        <!-- ПОИСКОВАЯ СТРОКА -->
        <div style="margin-top: 15px; display: flex; justify-content: center;">
            <form action="search.html" method="get" style="display: flex; width: 100%; max-width: 500px; gap: 10px;">
                <input type="text" name="q" placeholder="🔍 Поиск по тайтлам и дабберам..." 
                       style="flex: 1; padding: 12px 20px; border: 2px solid #001a8c; border-radius: 50px; font-size: 16px; outline: none;"
                       required>
                <button type="submit" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%); color: white; border: none; padding: 0 25px; border-radius: 50px; font-weight: bold; cursor: pointer;">
                    Найти
                </button>
            </form>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <a href="index.html">
                <img src="logo.jpg" alt="Логотип Вата" class="avatar" width="240" height="240" onerror="this.src='https://via.placeholder.com/240/001a8c/ffffff?text=VAT'">
            </a>
            <h1 class="title">Наши тайтлы</h1>
            <p class="text">Обложки кликабельны (ведут на страницу тайтла)</p>
            <hr>
        </div>
        
        <div class="content-box">
            <div class="titles-grid" id="titles-container">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>
    
    <!-- Футер -->
    <div class="container" style="margin-top: 20px; padding: 20px; text-align: center;">
        <hr style="margin: 20px 0;">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 15px;">
            <a href="index.html" style="color: #001a8c; text-decoration: none;">Главная</a>
            <a href="titles.html" style="color: #001a8c; text-decoration: none;">Тайтлы</a>
            <a href="sostav.html" style="color: #001a8c; text-decoration: none;">Состав</a>
            <a href="privacy.html" style="color: #001a8c; text-decoration: none;">Политика конфиденциальности</a>
        </div>
        <p style="font-size: 14px; color: #666; margin: 5px 0;">
            © 2026 VAT - Voice Acting Team. Все права защищены.
        </p>
    </div>

    <script>
    function loadTitles() {
        const container = document.getElementById('titles-container');
        
        setTimeout(() => {
            if (window.titlesDatabase && window.titlesDatabase.length > 0) {
                container.innerHTML = window.titlesDatabase.map(title => `
                    <a href="${title.id}.html" class="title-card">
                        <img src="${title.image}" alt="${title.name}" class="title-card-image" onerror="this.src='https://via.placeholder.com/200x280/001a8c/ffffff?text=${encodeURIComponent(title.name)}'">
                        <div class="title-card-info">
                            <div class="title-card-name">${title.name}</div>
                            <div class="title-card-meta">
                                <span>⚡ ${title.episodes || '?'} серий</span>
                                <span>⭐ 4.8</span>
                            </div>
                        </div>
                    </a>
                `).join('');
            } else {
                container.innerHTML = `
                    <a href="molchalivaya_vedma.html" class="title-card">
                        <img src="молч_ведьм.jpg" alt="Молчаливая ведьма" class="title-card-image">
                        <div class="title-card-info">
                            <div class="title-card-name">Молчаливая ведьма</div>
                            <div class="title-card-meta"><span>⚡ 13 серий</span><span>⭐ 4.8</span></div>
                        </div>
                    </a>
                    <a href="zvezdnoe_ditya.html" class="title-card">
                        <img src="ЗД.png" alt="Звёздное дитя" class="title-card-image">
                        <div class="title-card-info">
                            <div class="title-card-name">Звёздное дитя</div>
                            <div class="title-card-meta"><span>⚡ 35 серий</span><span>⭐ 4.5</span></div>
                        </div>
                    </a>
                    <a href="hellsing.html" class="title-card">
                        <img src="hellsing.jpg" alt="Хеллсинг" class="title-card-image">
                        <div class="title-card-info">
                            <div class="title-card-name">Хеллсинг</div>
                            <div class="title-card-meta"><span>⚡ 13 серий</span><span>⭐ 4.9</span></div>
                        </div>
                    </a>
                `;
            }
        }, 500);
    }
    
    document.addEventListener('DOMContentLoaded', loadTitles);
    </script>
</body>
</html>
