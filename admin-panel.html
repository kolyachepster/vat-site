<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - VAT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #001a8c, #320063);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .admin-tab {
            padding: 12px 25px;
            background: #f0f0f0;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .admin-tab.active {
            background: #001a8c;
            color: white;
        }
        .admin-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .admin-button {
            background: #001a8c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .admin-button.secondary { background: #666; }
        .admin-button.danger { background: #d43f6b; }
        .item-card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-name {
            font-weight: bold;
            color: #001a8c;
        }
        .delete-btn {
            background: #d43f6b;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .success-message {
            background: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            display: none;
            margin-bottom: 20px;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>👨‍💼 Админ-панель</h1>
            <button onclick="logout()" class="admin-button secondary">Выйти</button>
        </div>
        
        <div id="successMessage" class="success-message"></div>
        
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('titles')">📺 Тайтлы</button>
            <button class="admin-tab" onclick="switchTab('voices')">🎭 Дабберы</button>
            <button class="admin-tab" onclick="switchTab('roles')">🔗 Роли</button>
        </div>
        
        <!-- Тайтлы -->
        <div id="titlesSection" class="admin-section">
            <h2>➕ Добавить тайтл</h2>
            <form id="titleForm">
                <div class="form-grid">
                    <div class="form-group"><label>ID</label><input id="titleId" placeholder="molchalivaya_vedma" required></div>
                    <div class="form-group"><label>Название (рус)</label><input id="titleName" placeholder="Молчаливая ведьма" required></div>
                    <div class="form-group"><label>Название (англ)</label><input id="titleNameEn" placeholder="The Silent Witch"></div>
                    <div class="form-group"><label>Изображение</label><input id="titleImage" placeholder="молч_ведьм.jpg" value="ава-"></div>
                </div>
                <button type="submit" class="admin-button">➕ Добавить тайтл</button>
            </form>
            <div id="titlesList" class="items-list">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
        
        <!-- Дабберы -->
        <div id="voicesSection" class="admin-section" style="display:none">
            <h2>➕ Добавить даббера</h2>
            <form id="voiceForm">
                <div class="form-grid">
                    <div class="form-group"><label>ID</label><input id="voiceId" placeholder="miki-angel" required></div>
                    <div class="form-group"><label>Имя</label><input id="voiceName" placeholder="Miki-angel" required></div>
                    <div class="form-group"><label>Изображение</label><input id="voiceImage" placeholder="ава-miki.jpg" value="ава-"></div>
                    <div class="form-group"><label>Статус</label>
                        <select id="voiceStatus">
                            <option value="Основной состав">Основной состав</option>
                            <option value="Доп. состав">Доп. состав</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="admin-button">➕ Добавить даббера</button>
            </form>
            <div id="voicesList" class="items-list">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
        
        <!-- Роли -->
        <div id="rolesSection" class="admin-section" style="display:none">
            <h2>➕ Добавить роль</h2>
            <form id="roleForm">
                <div class="form-grid">
                    <div class="form-group"><label>Тайтл</label><select id="roleTitleId" required></select></div>
                    <div class="form-group"><label>Даббер</label><select id="roleVoiceId" required></select></div>
                    <div class="form-group"><label>Персонаж</label><input id="roleCharacter" placeholder="Эльза"></div>
                </div>
                <button type="submit" class="admin-button">➕ Добавить роль</button>
            </form>
            <div id="rolesList" class="items-list">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC-LWCtieKF69kWRRY53Snvor_1KGgCY_A",
            authDomain: "vat-site-43783.firebaseapp.com",
            projectId: "vat-site-43783",
            storageBucket: "vat-site-43783.firebasestorage.app",
            messagingSenderId: "987773125200",
            appId: "1:987773125200:web:04cfdc68e320c426090755"
        };
        
        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);
        
        // Глобальные переменные для данных
        let titlesDatabase = [];
        let voicesDatabase = [];
        let rolesDatabase = [];
        
        // Проверка авторизации
        const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
        if (!isLoggedIn) {
            window.location.href = 'admin-login.html';
        }
        
        // Функция для показа сообщения
        function showMessage(text, isSuccess = true) {
            const msg = document.getElementById('successMessage');
            msg.textContent = text;
            msg.style.display = 'block';
            msg.style.background = isSuccess ? '#4CAF50' : '#d43f6b';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 2000);
        }
        
        // Переключение вкладок
        window.switchTab = function(tab) {
            document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('titlesSection').style.display = tab === 'titles' ? 'block' : 'none';
            document.getElementById('voicesSection').style.display = tab === 'voices' ? 'block' : 'none';
            document.getElementById('rolesSection').style.display = tab === 'roles' ? 'block' : 'none';
            if (tab === 'roles') {
                updateRoleSelects();
            }
        };
        
        // ===== ТАЙТЛЫ =====
        document.getElementById('titleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newTitle = {
                id: document.getElementById('titleId').value,
                name: document.getElementById('titleName').value,
                nameEng: document.getElementById('titleNameEn').value || '',
                image: document.getElementById('titleImage').value || 'ава-',
                status: 'Основной состав'
            };
            
            // Добавляем в локальный массив
            titlesDatabase.push(newTitle);
            
            try {
                // Сохраняем в Firebase
                await set(ref(database, 'titles'), titlesDatabase);
                showMessage('✅ Тайтл успешно добавлен!');
                
                // Очищаем форму
                document.getElementById('titleForm').reset();
                
                // Обновляем отображение
                renderTitles();
                updateRoleSelects();
                
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showMessage('❌ Ошибка сохранения', false);
            }
        });
        
        window.deleteTitle = async (id) => {
            if (!confirm('Вы уверены, что хотите удалить этот тайтл?')) return;
            
            // Удаляем из локального массива
            titlesDatabase = titlesDatabase.filter(t => t.id !== id);
            
            try {
                // Сохраняем в Firebase
                await set(ref(database, 'titles'), titlesDatabase);
                showMessage('✅ Тайтл удалён');
                
                // Обновляем отображение
                renderTitles();
                updateRoleSelects();
                
            } catch (error) {
                console.error('Ошибка удаления:', error);
                showMessage('❌ Ошибка удаления', false);
            }
        };
        
        function renderTitles() {
            const list = document.getElementById('titlesList');
            
            if (titlesDatabase.length === 0) {
                list.innerHTML = '<p class="loading">Нет тайтлов. Добавьте первый!</p>';
                return;
            }
            
            list.innerHTML = titlesDatabase.map(t => `
                <div class="item-card">
                    <div>
                        <div class="item-name">${t.name}</div>
                        <div style="font-size:12px; color:#666;">ID: ${t.id}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteTitle('${t.id}')">Удалить</button>
                </div>
            `).join('');
        }
        
        // ===== ДАББЕРЫ =====
        document.getElementById('voiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newVoice = {
                id: document.getElementById('voiceId').value,
                name: document.getElementById('voiceName').value,
                image: document.getElementById('voiceImage').value || 'ава-',
                status: document.getElementById('voiceStatus').value,
                bio: ''
            };
            
            // Добавляем в локальный массив
            voicesDatabase.push(newVoice);
            
            try {
                // Сохраняем в Firebase
                await set(ref(database, 'voices'), voicesDatabase);
                showMessage('✅ Даббер успешно добавлен!');
                
                // Очищаем форму
                document.getElementById('voiceForm').reset();
                
                // Обновляем отображение
                renderVoices();
                updateRoleSelects();
                
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showMessage('❌ Ошибка сохранения', false);
            }
        });
        
        window.deleteVoice = async (id) => {
            if (!confirm('Вы уверены, что хотите удалить этого даббера?')) return;
            
            // Удаляем из локального массива
            voicesDatabase = voicesDatabase.filter(v => v.id !== id);
            
            try {
                // Сохраняем в Firebase
                await set(ref(database, 'voices'), voicesDatabase);
                showMessage('✅ Даббер удалён');
                
                // Обновляем отображение
                renderVoices();
                updateRoleSelects();
                
            } catch (error) {
                console.error('Ошибка удаления:', error);
                showMessage('❌ Ошибка удаления', false);
            }
        };
        
        function renderVoices() {
            const list = document.getElementById('voicesList');
            
            if (voicesDatabase.length === 0) {
                list.innerHTML = '<p class="loading">Нет дабберов. Добавьте первого!</p>';
                return;
            }
            
            list.innerHTML = voicesDatabase.map(v => `
                <div class="item-card">
                    <div>
                        <div class="item-name">${v.name}</div>
                        <div style="font-size:12px; color:#666;">${v.status} | ID: ${v.id}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteVoice('${v.id}')">Удалить</button>
                </div>
            `).join('');
        }
        
        // ===== РОЛИ =====
        function updateRoleSelects() {
            const titleSelect = document.getElementById('roleTitleId');
            const voiceSelect = document.getElementById('roleVoiceId');
            
            if (titlesDatabase.length > 0) {
                titleSelect.innerHTML = titlesDatabase.map(t => 
                    `<option value="${t.id}">${t.name}</option>`
                ).join('');
            } else {
                titleSelect.innerHTML = '<option value="">Нет тайтлов</option>';
            }
            
            if (voicesDatabase.length > 0) {
                voiceSelect.innerHTML = voicesDatabase.map(v => 
                    `<option value="${v.id}">${v.name}</option>`
                ).join('');
            } else {
                voiceSelect.innerHTML = '<option value="">Нет дабберов</option>';
            }
        }
        
        document.getElementById('roleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newRole = {
                titleId: document.getElementById('roleTitleId').value,
                voiceId: document.getElementById('roleVoiceId').value,
                character: document.getElementById('roleCharacter').value || 'Персонаж',
                type: 'main'
            };
            
            // Добавляем в локальный массив
            rolesDatabase.push(newRole);
            
            try {
                // Сохраняем в Firebase
                await set(ref(database, 'roles'), rolesDatabase);
                showMessage('✅ Роль успешно добавлена!');
                
                // Очищаем форму
                document.getElementById('roleForm').reset();
                
                // Обновляем отображение
                renderRoles();
                
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showMessage('❌ Ошибка сохранения', false);
            }
        });
        
        window.deleteRole = async (index) => {
            if (!confirm('Вы уверены, что хотите удалить эту роль?')) return;
            
            // Удаляем из локального массива
            rolesDatabase.splice(index, 1);
            
            try {
                // Сохраняем в Firebase
                await set(ref(database, 'roles'), rolesDatabase);
                showMessage('✅ Роль удалена');
                
                // Обновляем отображение
                renderRoles();
                
            } catch (error) {
                console.error('Ошибка удаления:', error);
                showMessage('❌ Ошибка удаления', false);
            }
        };
        
        function renderRoles() {
            const list = document.getElementById('rolesList');
            
            if (rolesDatabase.length === 0) {
                list.innerHTML = '<p class="loading">Нет ролей. Добавьте первую!</p>';
                return;
            }
            
            list.innerHTML = rolesDatabase.map((r, i) => {
                const title = titlesDatabase.find(t => t.id === r.titleId);
                const voice = voicesDatabase.find(v => v.id === r.voiceId);
                return `
                    <div class="item-card">
                        <div>
                            <div class="item-name">${title?.name || '?'} → ${voice?.name || '?'}</div>
                            <div style="font-size:12px; color:#666;">Персонаж: ${r.character}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteRole(${i})">Удалить</button>
                    </div>
                `;
            }).join('');
        }
        
        // ===== ВЫХОД =====
        window.logout = async () => {
            await signOut(auth);
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin-login.html';
        };
        
        // ===== ЗАГРУЗКА ДАННЫХ ИЗ FIREBASE =====
        async function loadData() {
            try {
                // Загружаем тайтлы
                const titlesSnap = await get(child(ref(database), 'titles'));
                if (titlesSnap.exists()) {
                    const data = titlesSnap.val();
                    titlesDatabase = Array.isArray(data) ? data : Object.values(data);
                }
                
                // Загружаем дабберов
                const voicesSnap = await get(child(ref(database), 'voices'));
                if (voicesSnap.exists()) {
                    const data = voicesSnap.val();
                    voicesDatabase = Array.isArray(data) ? data : Object.values(data);
                }
                
                // Загружаем роли
                const rolesSnap = await get(child(ref(database), 'roles'));
                if (rolesSnap.exists()) {
                    const data = rolesSnap.val();
                    rolesDatabase = Array.isArray(data) ? data : Object.values(data);
                }
                
                console.log('Данные загружены из Firebase:');
                console.log('- Тайтлы:', titlesDatabase.length);
                console.log('- Дабберы:', voicesDatabase.length);
                console.log('- Роли:', rolesDatabase.length);
                
                // Обновляем отображение
                renderTitles();
                renderVoices();
                renderRoles();
                updateRoleSelects();
                
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                showMessage('❌ Ошибка загрузки данных', false);
            }
        }
        
        // Запускаем загрузку
        loadData();
    </script>
</body>
</html>
