<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - VAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #001a8c, #320063);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .admin-tab {
            padding: 12px 25px;
            background: #f0f0f0;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .admin-tab.active {
            background: #001a8c;
            color: white;
        }
        .admin-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .admin-button {
            background: #001a8c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .item-card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-name {
            font-weight: bold;
            color: #001a8c;
        }
        .delete-btn {
            background: #d43f6b;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .success-message {
            background: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            display: none;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>👨‍💼 Админ-панель</h1>
            <button onclick="logout()" class="admin-button">Выйти</button>
        </div>
        
        <div id="successMessage" class="success-message"></div>
        
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('titles')">📺 Тайтлы</button>
            <button class="admin-tab" onclick="switchTab('voices')">🎭 Дабберы</button>
            <button class="admin-tab" onclick="switchTab('roles')">🔗 Роли</button>
        </div>
        
        <!-- Тайтлы -->
        <div id="titlesSection" class="admin-section">
            <h2>➕ Добавить тайтл</h2>
            <form id="titleForm">
                <div class="form-grid">
                    <div class="form-group"><label>ID</label><input id="titleId" required></div>
                    <div class="form-group"><label>Название</label><input id="titleName" required></div>
                    <div class="form-group"><label>Изображение</label><input id="titleImage" value="ава-"></div>
                </div>
                <button type="submit" class="admin-button">➕ Добавить</button>
            </form>
            <div id="titlesList"></div>
        </div>
        
        <!-- Дабберы -->
        <div id="voicesSection" class="admin-section" style="display:none">
            <h2>➕ Добавить даббера</h2>
            <form id="voiceForm">
                <div class="form-grid">
                    <div class="form-group"><label>ID</label><input id="voiceId" required></div>
                    <div class="form-group"><label>Имя</label><input id="voiceName" required></div>
                    <div class="form-group"><label>Изображение</label><input id="voiceImage" value="ава-"></div>
                    <div class="form-group"><label>Статус</label>
                        <select id="voiceStatus">
                            <option value="Основной состав">Основной</option>
                            <option value="Доп. состав">Доп.</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="admin-button">➕ Добавить</button>
            </form>
            <div id="voicesList"></div>
        </div>
        
        <!-- Роли -->
        <div id="rolesSection" class="admin-section" style="display:none">
            <h2>➕ Добавить роль</h2>
            <form id="roleForm">
                <div class="form-grid">
                    <div class="form-group"><label>Тайтл</label><select id="roleTitleId"></select></div>
                    <div class="form-group"><label>Даббер</label><select id="roleVoiceId"></select></div>
                    <div class="form-group"><label>Персонаж</label><input id="roleCharacter"></div>
                </div>
                <button type="submit" class="admin-button">➕ Добавить</button>
            </form>
            <div id="rolesList"></div>
        </div>
    </div>

    <script type="module">
        import firebase from './firebase-config.js';
        window.firebase = firebase;
        
        // Проверка авторизации
        setTimeout(() => {
            if (!firebase.isAdminLoggedIn()) {
                window.location.href = 'admin-login.html';
            }
        }, 500);
        
        function showMessage(text) {
            const msg = document.getElementById('successMessage');
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 2000);
        }
        
        window.switchTab = function(tab) {
            document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('titlesSection').style.display = tab === 'titles' ? 'block' : 'none';
            document.getElementById('voicesSection').style.display = tab === 'voices' ? 'block' : 'none';
            document.getElementById('rolesSection').style.display = tab === 'roles' ? 'block' : 'none';
            if (tab === 'roles') updateSelects();
        };
        
        // Тайтлы
        document.getElementById('titleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newTitle = {
                id: document.getElementById('titleId').value,
                name: document.getElementById('titleName').value,
                image: document.getElementById('titleImage').value,
                type: 'anime', seasons: 1, episodes: 12
            };
            window.titlesDatabase.push(newTitle);
            await firebase.saveTitles(window.titlesDatabase);
            renderTitles();
            showMessage('✅ Тайтл добавлен');
        });
        
        window.deleteTitle = async (id) => {
            if (!confirm('Удалить?')) return;
            window.titlesDatabase = window.titlesDatabase.filter(t => t.id !== id);
            await firebase.saveTitles(window.titlesDatabase);
            renderTitles();
            showMessage('✅ Тайтл удалён');
        };
        
        function renderTitles() {
            const list = document.getElementById('titlesList');
            list.innerHTML = window.titlesDatabase.map(t => `
                <div class="item-card">
                    <span class="item-name">${t.name}</span>
                    <button class="delete-btn" onclick="deleteTitle('${t.id}')">Удалить</button>
                </div>
            `).join('');
        }
        
        // Дабберы
        document.getElementById('voiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newVoice = {
                id: document.getElementById('voiceId').value,
                name: document.getElementById('voiceName').value,
                image: document.getElementById('voiceImage').value,
                status: document.getElementById('voiceStatus').value
            };
            window.voicesDatabase.push(newVoice);
            await firebase.saveVoices(window.voicesDatabase);
            renderVoices();
            showMessage('✅ Даббер добавлен');
        });
        
        window.deleteVoice = async (id) => {
            if (!confirm('Удалить?')) return;
            window.voicesDatabase = window.voicesDatabase.filter(v => v.id !== id);
            await firebase.saveVoices(window.voicesDatabase);
            renderVoices();
            showMessage('✅ Даббер удалён');
        };
        
        function renderVoices() {
            const list = document.getElementById('voicesList');
            list.innerHTML = window.voicesDatabase.map(v => `
                <div class="item-card">
                    <span class="item-name">${v.name}</span>
                    <button class="delete-btn" onclick="deleteVoice('${v.id}')">Удалить</button>
                </div>
            `).join('');
        }
        
        // Роли
        function updateSelects() {
            const titleSelect = document.getElementById('roleTitleId');
            const voiceSelect = document.getElementById('roleVoiceId');
            titleSelect.innerHTML = window.titlesDatabase.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            voiceSelect.innerHTML = window.voicesDatabase.map(v => `<option value="${v.id}">${v.name}</option>`).join('');
        }
        
        document.getElementById('roleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newRole = {
                titleId: document.getElementById('roleTitleId').value,
                voiceId: document.getElementById('roleVoiceId').value,
                character: document.getElementById('roleCharacter').value,
                type: 'main'
            };
            window.rolesDatabase.push(newRole);
            await firebase.saveRoles(window.rolesDatabase);
            renderRoles();
            showMessage('✅ Роль добавлена');
        });
        
        window.deleteRole = async (index) => {
            if (!confirm('Удалить?')) return;
            window.rolesDatabase.splice(index, 1);
            await firebase.saveRoles(window.rolesDatabase);
            renderRoles();
            showMessage('✅ Роль удалена');
        };
        
        function renderRoles() {
            const list = document.getElementById('rolesList');
            list.innerHTML = window.rolesDatabase.map((r, i) => {
                const title = window.titlesDatabase.find(t => t.id === r.titleId);
                const voice = window.voicesDatabase.find(v => v.id === r.voiceId);
                return `
                    <div class="item-card">
                        <span class="item-name">${title?.name} → ${voice?.name} (${r.character})</span>
                        <button class="delete-btn" onclick="deleteRole(${i})">Удалить</button>
                    </div>
                `;
            }).join('');
        }
        
        window.logout = async () => {
            await firebase.logoutAdmin();
            window.location.href = 'admin-login.html';
        };
        
        // Инициализация
        setTimeout(() => {
            renderTitles();
            renderVoices();
            renderRoles();
        }, 1000);
    </script>
</body>
</html>
