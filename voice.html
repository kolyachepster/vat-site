<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Даббер - VAT</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем data.js ПЕРВЫМ -->
    <script src="data.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <!-- ... остальные стили ... -->
    <style>
        .voice-profile {
            display: flex;
            gap: 30px;
            padding: 30px;
            background: white;
            border-radius: 15px;
        }
        .voice-avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #001a8c;
        }
        .voice-info { flex: 1; }
        .voice-name { font-size: 36px; color: #001a8c; margin: 0; }
        .voice-status {
            display: inline-block;
            background: #001a8c;
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
        }
        .role-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            margin: 3px;
        }
        .role-main { background: #001a8c; color: white; }
        .not-found {
            text-align: center;
            padding: 50px;
            background: #f5f5f5;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🏠 Главная</a>
            <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🎦 Тайтлы</a>
            <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">🎭 Состав</a>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <img src="logo.jpg" class="avatar" width="240" height="240">
            <hr>
        </div>
        
        <div class="content-box" id="voiceContent">
            <div class="loading">Загрузка...</div>
        </div>
    </div>

    <script>
        function getUrlParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }
        
        function displayVoice() {
            const id = getUrlParam('id');
            const content = document.getElementById('voiceContent');
            
            setTimeout(() => {
                const voice = window.getVoiceById ? window.getVoiceById(id) : null;
                
                if (!voice) {
                    content.innerHTML = '<div class="not-found"><h2>😕 Даббер не найден</h2><a href="sostav.html">← Назад</a></div>';
                    return;
                }
                
                const titles = window.getTitlesByVoiceId ? window.getTitlesByVoiceId(id) : [];
                
                let rolesHtml = '';
                titles.forEach(title => {
                    rolesHtml += `<h3>${title.name}</h3>`;
                    title.roles.forEach(role => {
                        rolesHtml += `<span class="role-badge role-${role.type}">${role.character || 'Роль'}</span> `;
                    });
                });
                
                content.innerHTML = `
                    <div class="voice-profile">
                        <img src="${voice.image}" class="voice-avatar">
                        <div class="voice-info">
                            <h1 class="voice-name">${voice.name}</h1>
                            <span class="voice-status">${voice.status}</span>
                            <p>${voice.bio || ''}</p>
                            <h3>Роли:</h3>
                            ${rolesHtml || '<p>Пока нет ролей</p>'}
                        </div>
                    </div>
                `;
            }, 500);
        }
        
        window.onload = displayVoice;
    </script>
</body>
</html>
