<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск - VAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <style>
        .search-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .search-query {
            color: #001a8c;
            font-weight: bold;
        }
        
        .search-results-count {
            font-size: 16px;
            color: #666;
            margin-top: 10px;
        }
        
        .search-section {
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #320063;
            color: #001a8c;
        }
        
        .no-results {
            text-align: center;
            padding: 50px;
            background: #f5f5f5;
            border-radius: 10px;
            color: #666;
        }
        
        .no-results .suggestions {
            margin-top: 20px;
            font-size: 14px;
        }
        
        .result-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
            border-radius: 10px;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
            margin-bottom: 10px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .result-item:hover {
            background: rgba(0, 26, 140, 0.05);
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .result-image {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .result-info {
            flex: 1;
        }
        
        .result-title {
            font-size: 18px;
            font-weight: bold;
            color: #001a8c;
            margin-bottom: 5px;
        }
        
        .result-meta {
            font-size: 14px;
            color: #666;
        }
        
        .result-type {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .type-title {
            background: #001a8c;
            color: white;
        }
        
        .type-voice {
            background: #320063;
            color: white;
        }
        
        .search-form-small {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #001a8c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <div class="container">
        <div class="navigation-buttons">
            <a href="index.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🏠 Главная
            </a>
            <a href="titles.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🎦 Тайтлы
            </a>
            <a href="sostav.html" class="nav-button" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%);">
                🎭 Состав
            </a>
        </div>
        
        <!-- Поиск (маленький) -->
        <div class="search-form-small">
            <form action="search.html" method="get" style="display: flex; width: 100%; gap: 10px;">
                <input type="text" name="q" placeholder="🔍 Новый поиск..." 
                       style="flex: 1; padding: 10px 15px; border: 2px solid #001a8c; border-radius: 50px; font-size: 14px; outline: none;"
                       required>
                <button type="submit" style="background: linear-gradient(135deg, #001a8c 0%, #320063 100%); color: white; border: none; padding: 0 20px; border-radius: 50px; cursor: pointer;">
                    Найти
                </button>
            </form>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="container">
        <div class="header">
            <a href="index.html">
                <img src="logo.jpg" alt="Логотип Вата" class="avatar" width="240" height="240">
            </a>
            <hr>
        </div>
        
        <div class="content-box">
            <div class="search-header">
                <h1 class="title">Результаты поиска</h1>
                <div id="search-query-display" class="search-query"></div>
                <div id="results-count" class="search-results-count"></div>
            </div>
            
            <hr>
            
            <!-- Результаты будут вставлены сюда -->
            <div id="search-results" class="loading">
                <div class="loading-spinner"></div>
                <p>Поиск...</p>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <div class="container" style="margin-top: 20px; padding: 20px; text-align: center;">
        <hr style="margin: 20px 0;">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 15px;">
            <a href="index.html" style="color: #001a8c; text-decoration: none;">Главная</a>
            <a href="titles.html" style="color: #001a8c; text-decoration: none;">Тайтлы</a>
            <a href="sostav.html" style="color: #001a8c; text-decoration: none;">Состав</a>
            <a href="privacy.html" style="color: #001a8c; text-decoration: none;">Политика конфиденциальности</a>
        </div>
        <p style="font-size: 14px; color: #666; margin: 5px 0;">
            © 2026 VAT - Voice Acting Team. Все права защищены.
        </p>
        <p style="font-size: 12px; color: #999; margin: 5px 0;">
            Сайт создан фанатами для фанатов. Все видео и материалы принадлежат их законным владельцам.
        </p>
    </div>

    <script>
        // База данных для поиска (создаём на основе данных из data.js)
        let searchDatabase = [];
        
        // Функция для построения базы поиска
        function buildSearchDatabase() {
            searchDatabase = [];
            
            // Добавляем тайтлы
            if (window.titlesDatabase) {
                window.titlesDatabase.forEach(title => {
                    searchDatabase.push({
                        type: 'title',
                        typeName: 'Аниме',
                        name: title.name,
                        nameEn: title.nameEng || '',
                        url: `${title.id}.html`,
                        image: title.image,
                        meta: `${title.episodes || '?'} серий`
                    });
                });
            }
            
            // Добавляем дабберов
            if (window.voicesDatabase) {
                window.voicesDatabase.forEach(voice => {
                    searchDatabase.push({
                        type: 'voice',
                        typeName: 'Даббер',
                        name: voice.name,
                        url: `voice.html?id=${voice.id}`,
                        image: voice.image,
                        meta: voice.status || 'Даббер'
                    });
                });
            }
            
            console.log('База поиска построена:', searchDatabase.length, 'элементов');
        }
        
        // Получаем поисковый запрос из URL
        function getQueryParam() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('q') || '';
        }

        // Выполняем поиск
        function performSearch(query) {
            if (!query) return [];
            
            query = query.toLowerCase().trim();
            
            return searchDatabase.filter(item => {
                // Поиск по имени
                if (item.name && item.name.toLowerCase().includes(query)) return true;
                // Поиск по английскому имени
                if (item.nameEn && item.nameEn.toLowerCase().includes(query)) return true;
                return false;
            });
        }

        // Отображаем результаты
        function displayResults() {
            const query = getQueryParam();
            
            // Если база поиска пустая, пробуем построить
            if (searchDatabase.length === 0) {
                buildSearchDatabase();
            }
            
            const results = performSearch(query);
            
            // Отображаем запрос
            document.getElementById('search-query-display').innerHTML = `По запросу: <span class="search-query">"${query}"</span>`;
            
            // Если запрос пустой
            if (!query) {
                document.getElementById('search-results').innerHTML = `
                    <div class="no-results">
                        <h3>🔍 Введите поисковый запрос</h3>
                        <p class="suggestions">Попробуйте найти: Молчаливая ведьма, DNT, Miki-angel...</p>
                    </div>
                `;
                document.getElementById('results-count').innerHTML = '';
                return;
            }
            
            // Количество результатов
            document.getElementById('results-count').innerHTML = `Найдено: ${results.length}`;
            
            // Если ничего не найдено
            if (results.length === 0) {
                document.getElementById('search-results').innerHTML = `
                    <div class="no-results">
                        <h3>😕 Ничего не найдено</h3>
                        <p>По запросу "${query}" ничего не найдено</p>
                        <p class="suggestions">💡 Попробуйте:<br>
                        - Проверить написание<br>
                        - Использовать более короткий запрос</p>
                    </div>
                `;
                return;
            }
            
            // Группируем результаты по типу
            const titles = results.filter(r => r.type === 'title');
            const voices = results.filter(r => r.type === 'voice');
            
            let html = '';
            
            // Тайтлы
            if (titles.length > 0) {
                html += '<h2 class="search-section">🎬 Тайтлы</h2>';
                titles.forEach(item => {
                    html += `
                        <a href="${item.url}" class="result-item">
                            <img src="${item.image}" alt="${item.name}" class="result-image" onerror="this.src='https://via.placeholder.com/60/001a8c/ffffff?text=?'">
                            <div class="result-info">
                                <div class="result-title">${item.name}</div>
                                <div class="result-meta">
                                    <span class="result-type type-title">${item.typeName}</span>
                                    ${item.meta}
                                </div>
                            </div>
                        </a>
                    `;
                });
            }
            
            // Дабберы
            if (voices.length > 0) {
                html += '<h2 class="search-section">🎭 Дабберы</h2>';
                voices.forEach(item => {
                    html += `
                        <a href="${item.url}" class="result-item">
                            <img src="${item.image}" alt="${item.name}" class="result-image" onerror="this.src='https://via.placeholder.com/60/320063/ffffff?text=?'">
                            <div class="result-info">
                                <div class="result-title">${item.name}</div>
                                <div class="result-meta">
                                    <span class="result-type type-voice">${item.typeName}</span>
                                    ${item.meta}
                                </div>
                            </div>
                        </a>
                    `;
                });
            }
            
            document.getElementById('search-results').innerHTML = html;
        }

        // Ждём загрузки данных
        function waitForData() {
            const checkInterval = setInterval(() => {
                if (window.voicesDatabase && window.titlesDatabase) {
                    clearInterval(checkInterval);
                    buildSearchDatabase();
                    displayResults();
                }
            }, 100);
            
            // Таймаут на случай, если данные не загрузятся
            setTimeout(() => {
                clearInterval(checkInterval);
                if (searchDatabase.length === 0) {
                    // Используем заглушки
                    searchDatabase = [
                        { type: 'title', typeName: 'Аниме', name: 'Молчаливая ведьма', url: 'molchalivaya_vedma.html', image: 'молч_ведьм.jpg', meta: '13 серий' },
                        { type: 'title', typeName: 'Аниме', name: 'Звёздное дитя', url: 'zvezdnoe_ditya.html', image: 'ЗД.png', meta: '36 серий' },
                        { type: 'voice', typeName: 'Даббер', name: 'Miki-angel', url: 'voice.html?id=miki-angel', image: 'ава-miki.jpg', meta: 'Основной состав' },
                        { type: 'voice', typeName: 'Даббер', name: 'Раскольников', url: 'voice.html?id=raskolnikov', image: 'ава-raskolnikov.jpg', meta: 'Основной состав' },
                        { type: 'voice', typeName: 'Даббер', name: 'DNT', url: 'voice.html?id=dnt', image: 'ава-dnt.jpg', meta: 'Основной состав' }
                    ];
                    displayResults();
                }
            }, 3000);
        }

        // Запускаем при загрузке
        window.onload = waitForData;
    </script>
</body>
</html>
